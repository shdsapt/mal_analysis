# CSS 셀렉터 (로그인 페이지 구조에 따라 조정 필요)
# 브라우저 개발자 도구(F12)로 확인 후 수정하세요
id_selector = #username
pw_selector = #password
login_btn_selector = input[type=submit]

# 2차 인증 입력 필드 셀렉터
otp_input_selector = #authCode
otp_submit_selector = #otpBtn

# 로그인 완료 후 확인할 요소 (메일함 등)
login_success_selector = .mail-list

[gmail_imap]
email = shds.apt@gmail.com
# Google 계정 > 보안 > 2단계 인증 > 앱 비밀번호에서 생성한 16자리
app_password = fimtapsmuznaqqrp
imap_server = imap.gmail.com

# 인증코드 메일 발신자 필터 (대소문자 무시)
sender_filter = shinhan

# 인증코드 추출 정규식 (6자리 숫자 기본)
code_pattern = \d{6}

# 인증코드 메일 대기 시간 (초)
max_wait_seconds = 60
poll_interval_seconds = 5

[browser]
# chrome 또는 edge
browser_type = chrome
# 브라우저를 화면에 표시할지 여부 (True = 표시, False = 백그라운드)
headless = False
# 페이지 로딩 대기 시간 (초)
page_load_timeout = 30
